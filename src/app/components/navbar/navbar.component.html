<nav class="navbar">
  <div class="navbar__inner">

    <a class="navbar__logo" href="#inicio" (click)="scrollTo('#inicio'); $event.preventDefault()">
      <img src="assets/images/logo-light.png" alt="Dan Luna Photo" />
    </a>

    <ul class="navbar__links" [class.navbar__links--open]="menuOpen()">
      @for (link of links; track link.label) {
        <li
          class="navbar__item"
          [class.navbar__item--has-submenu]="link.submenu"
          [class.navbar__item--open]="link.submenu && activeSubmenu() === link.label"
        >
          @if (link.submenu) {
            <button
              class="navbar__link"
              (click)="toggleSubmenu(link.label)"
              [attr.aria-expanded]="activeSubmenu() === link.label"
            >
              {{ link.label }}
              <span class="navbar__arrow">▼</span>
            </button>
            <ul class="navbar__submenu" [class.navbar__submenu--visible]="activeSubmenu() === link.label">
              <div class="navbar__submenu-content">
                @for (subitem of link.submenu; track subitem.label) {
                  <li>
                    <a [href]="subitem.href" (click)="scrollTo(subitem.href); $event.preventDefault()">
                      {{ subitem.label }}
                    </a>
                  </li>
                }
              </div>
            </ul>
          } @else {
            <a class="navbar__link" [href]="link.href" (click)="scrollTo(link.href!); $event.preventDefault()">
              {{ link.label }}
            </a>
          }
        </li>
      }
    </ul>

    <div class="navbar__right">
      <a
        class="navbar__cta"
        href="https://wa.me/525667704976?text=Hola%2C%20me%20gustar%C3%ADa%20reservar%20una%20sesi%C3%B3n%20fotogr%C3%A1fica.%20%C2%BFPodr%C3%ADan%20darme%20m%C3%A1s%20informaci%C3%B3n%3F"
        target="_blank"
        rel="noopener"
      >
        Reservar sesión
      </a>
    </div>

    <button class="navbar__hamburger" (click)="toggleMenu()" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

  </div>
</nav>
