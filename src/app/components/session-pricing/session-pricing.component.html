<section class="session-pricing">
  <div class="session-pricing__inner">

    <h2 class="session-pricing__headline">
      Reserva &mdash;
      <span class="session-pricing__typed">{{ typedText }}</span><span class="session-pricing__cursor" aria-hidden="true">|</span>
    </h2>

    <div class="session-pricing__card">
      <div class="session-pricing__prices">

        <div class="session-pricing__presale">
          <span class="session-pricing__tier-label">Precio de preventa</span>
          <span class="session-pricing__presale-amount">$1,800</span>
          <span class="session-pricing__badge">Lugares limitados</span>
        </div>

        <div class="session-pricing__divider" aria-hidden="true"></div>

        <div class="session-pricing__regular">
          <span class="session-pricing__tier-label">Precio regular</span>
          <span class="session-pricing__regular-amount">$2,300</span>
        </div>

      </div>

      <p class="session-pricing__note">
        Aparta con el 50% y garantiza una sorpresa inolvidable para mamá
      </p>
    </div>

  </div>
</section>
