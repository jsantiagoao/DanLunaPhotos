<section class="hero">
  <div class="hero__overlay"></div>

  <div class="hero__inner">
    <div class="hero__badge">
      <span>FOTOGRAFÍA PROFESIONAL</span>
    </div>

    <h1 class="hero__headline">
      Cada momento,<br>una obra.
    </h1>

    <p class="hero__sub">
      Fotografía de retratos, bodas y sesiones artísticas.<br>
      Capturando la esencia de cada persona y momento.
    </p>

    <div class="hero__ctas">
      <button class="hero__cta hero__cta--primary" (click)="scrollToPortfolio()">
        Ver portfolio
      </button>
      <button class="hero__cta hero__cta--secondary" (click)="scrollToContact()">
        Reservar sesión
      </button>
    </div>
  </div>
</section>
