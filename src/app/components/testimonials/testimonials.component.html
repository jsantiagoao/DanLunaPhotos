<section class="testimonials">
  <div class="testimonials__inner">

    <header class="testimonials__header">
      <p class="testimonials__overline">TESTIMONIOS</p>
      <h2 class="testimonials__title">
        Lo que dicen quienes<br>confiaron en mi lente.
      </h2>
    </header>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.name) {
        <div class="testimonials__card">
          <span class="testimonials__stars">{{ t.stars }}</span>
          <p class="testimonials__quote">{{ t.quote }}</p>
          <div class="testimonials__author">
            <span class="testimonials__author-name">{{ t.name }}</span>
            <span class="testimonials__author-type">{{ t.type }}</span>
          </div>
        </div>
      }
    </div>

  </div>
</section>
