<div class="mothers-day-content">
  <!-- Header Row: Breadcrumb and Title -->
  <div class="mothers-day-content__header">
    <div class="mothers-day-content__header-inner">
      <div class="mothers-day-content__title-group">
        <h1 class="mothers-day-content__title">Mother's Day 2026</h1>
        <p class="mothers-day-content__subtitle">Mini Sesiones</p>
      </div>
      <div class="mothers-day-content__breadcrumb-wrapper">
        <app-breadcrumb [items]="breadcrumbs" />
      </div>
    </div>
  </div>

  <!-- Hero Banner -->
  <div class="mothers-day-content__banner">
    <img
      src="assets/images/slider/Sesion-dia-de-las-madres-queretaro.jpeg"
      alt="Sesión Día de las Madres en Querétaro — Dan Luna Photos"
      class="mothers-day-content__banner-img"
    />
  </div>

  <!-- What Includes Section -->
  <app-what-includes id="que-incluye" />

  <!-- Session Pricing Section -->
  <app-session-pricing />

  <!-- Booking Steps Section -->
  <app-booking-steps id="pasos-reserva" />

  <!-- Final CTA -->
  <div class="mothers-day-content__final-cta">
    <a
      href="https://danlunaphotos.pixieset.com/booking/prueba-calendario"
      target="_blank"
      rel="noopener"
      class="mothers-day-content__final-btn"
    >
      ¡ Reserva tu sesión !
    </a>
  </div>
</div>
